<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Sampah - SampahPedia</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; text-align: center; }
        .upload-area { border: 2px dashed #2ecc71; padding: 30px; border-radius: 10px; margin: 20px 0; cursor: pointer; background: #f9f9f9; }
        .preview-img { max-width: 100%; max-height: 300px; margin-top: 15px; display: none; border-radius: 5px; }
        button { background: #2ecc71; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:disabled { background: #bdc3c7; }
        #hasil-analisis { text-align: left; margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; display: none; background: #fff; }
        .loading { display: none; color: #e67e22; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <h2>🤖 Scan Gambar Sampah</h2>
    <p>Ambil foto atau unggah gambar sampah untuk dianalisis oleh Gemini AI</p>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p>📷 Klik di sini untuk Ambil Foto / Pilih Gambar</p>
        <input type="file" id="fileInput" accept="image/*" capture="environment" style="display: none;" onchange="previewFile()">
        <img id="imagePreview" class="preview-img" alt="Preview Gambar">
    </div>

    <button id="scanBtn" onclick="uploadGambar()" disabled>Analisis Sampah Sekarang</button>
    
    <div id="loadingText" class="loading">⏳ Gemini sedang menganalisis gambar... Mohon tunggu...</div>

    <div id="hasil-analisis">
        <h3>📋 Hasil Analisis:</h3>
        <div id="textJawaban"></div>
    </div>

    <script>
        // Fungsi untuk menampilkan preview setelah memilih gambar/foto
        function previewFile() {
            const fileInput = document.getElementById('fileInput');
            const preview = document.getElementById('imagePreview');
            const btn = document.getElementById('scanBtn');
            
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    btn.disabled = false; // Aktifkan tombol scan
                }
                reader.readAsDataURL(file);
            }
        }

        // Fungsi untuk mengirim file ke backend Node.js
        async function uploadGambar() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file); // 'image' harus sama dengan yang ada di upload.single("image") backend

            // Ambil elemen UI
            const loadingText = document.getElementById('loadingText');
            const hasilBox = document.getElementById('hasil-analisis');
            const textJawaban = document.getElementById('textJawaban');
            const btn = document.getElementById('scanBtn');

            // Set tampilan saat loading
            loadingText.style.display = 'block';
            hasilBox.style.display = 'none';
            btn.disabled = true;

            try {
                // Tembak ke URL backend localhost kamu
                const response = await fetch('http://localhost:3000/api/scan-sampah', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    // Masukkan jawaban HTML dari Gemini langsung ke dalam div
                    textJawaban.innerHTML = data.analysis;
                    hasilBox.style.display = 'block';
                } else {
                    alert('Gagal: ' + data.message);
                }
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan saat menyambung ke server.');
            } finally {
                loadingText.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
