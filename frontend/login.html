<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SampahPedia</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span>🌿</span> <span>SampahPedia</span>
      </div>

      <h1 class="auth-title">Masuk</h1>
      <p class="auth-subtitle">
        Akses jalur pembelajaran dan pantau progres modulmu.
      </p>

      <form id="loginForm" class="auth-form">
        <div class="auth-input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="nama@email.com" required />
        </div>

        <div class="auth-input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="auth-btn">Login</button>
      </form>

      <p id="message" class="auth-message"></p>

      <div class="auth-footer">
        Belum punya akun?
        <a href="register.html">Daftar sekarang</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const msgEl = document.getElementById("message");

      const API_BASE = "http://localhost:3000";

      try {
        // === LOGIN ===
        const res = await fetch(`${API_BASE}/api/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          msgEl.textContent = data.message || "Login gagal";
          msgEl.className = "auth-message error";
          return;
        }

        if (!data.token) {
          msgEl.textContent = "Token tidak ditemukan. Login gagal.";
          msgEl.className = "auth-message error";
          return;
        }

        // === SIMPAN TOKEN ===
        localStorage.setItem("token", data.token);

        // === AMBIL DATA USER ===
        const meRes = await fetch(`${API_BASE}/api/me`, {
          headers: {
            Authorization: "Bearer " + data.token
          },
        });

        const me = await meRes.json();
        localStorage.setItem("user", JSON.stringify(me));

        msgEl.textContent = "Login berhasil, mengarahkan...";
        msgEl.className = "auth-message success";

        setTimeout(() => {
          if (me.role === "admin") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "index.html";
          }
        }, 700);

      } catch (err) {
        console.error(err);
        msgEl.textContent = "Terjadi error. Pastikan backend aktif.";
        msgEl.className = "auth-message error";
      }
    });
  </script>

</body>
</html>
