<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar | SampahPedia</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span>🌿</span> <span>SampahPedia</span>
      </div>
      <h1 class="auth-title">Daftar Akun</h1>
      <p class="auth-subtitle">Buat akun untuk mulai belajar dan menyimpan progres belajarmu.</p>

      <form id="registerForm" class="auth-form">
        <div class="auth-input-group">
          <label for="name">Nama Lengkap</label>
          <input type="text" id="name" placeholder="Nama kamu" required />
        </div>

        <div class="auth-input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="nama@email.com" required />
        </div>

        <div class="auth-input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimal 6 karakter" required />
        </div>

        <button type="submit" class="auth-btn">Daftar</button>
      </form>

      <p id="message" class="auth-message"></p>

      <div class="auth-footer">
        Sudah punya akun?
        <a href="login.html">Masuk di sini</a>
      </div>
    </div>
  </div>

  <script>
    document
      .getElementById("registerForm")
      .addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        const msgEl = document.getElementById("message");

        try {
          const res = await fetch("http://localhost:3000/api/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ name, email, password }),
          });

          const data = await res.json();

          if (res.ok) {
            msgEl.textContent = data.message || "Registrasi berhasil";
            msgEl.className = "auth-message success";

            // redirect ke login (lebih masuk akal setelah register)
            setTimeout(() => {
              window.location.href = "login.html";
            }, 700);
          } else {
            msgEl.textContent = data.message || "Registrasi gagal";
            msgEl.className = "auth-message error";
          }
        } catch (err) {
          console.error("Register error:", err);
          msgEl.textContent = "Terjadi kesalahan. Pastikan server aktif.";
          msgEl.className = "auth-message error";
        }
      });
  </script>

</body>
</html>
